services:
  # --- BANCO DE DADOS (PostgreSQL) ---
  db:
    image: postgres:16-alpine
    container_name: cert_db
    restart: always
    environment:
      POSTGRES_DB: cert_database
      POSTGRES_USER: cert_user
      POSTGRES_PASSWORD: ${DB_PASSWORD} 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 200M 
    networks:
      - cert_network

  # --- BACKEND (Django + Gunicorn) ---
  backend:
    build: ./backend
    container_name: cert_api
    restart: always
    command: gunicorn certpremium.wsgi:application --bind 0.0.0.0:8000
    environment:
      DEBUG: "0"
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: postgres://cert_user:${DB_PASSWORD}@db:5432/cert_database
    volumes:
      - ./backend:/app
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - cert_network

  # --- REVERSE PROXY E WAF (Nginx Proxy Manager) ---
  nginx:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: cert_nginx
    restart: always
    ports:
      - '80:80'   # HTTP
      - '443:443' # HTTPS
      - '81:81'   # Painel de Admin do Nginx
    volumes:
      - ./nginx/data:/data
      - ./nginx/letsencrypt:/etc/letsencrypt
    deploy:
      resources:
        limits:
          memory: 150M
    networks:
      - cert_network

networks:
  cert_network:
    driver: bridge

volumes:
  postgres_data:

